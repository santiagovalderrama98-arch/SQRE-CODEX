profiles:
  - profile_id: state_baseline
    description: Current default Market State thresholds
    overrides: {}

  - profile_id: directional_stricter
    description: More selective directional classification
    overrides:
      directional_displacement_efficiency_threshold: 0.65
      directional_displacement_confidence_threshold: 0.60
      directional_expansion_persistence_threshold: 0.55
      directional_expansion_efficiency_threshold: 0.65

  - profile_id: consolidation_sensitive
    description: More sensitive consolidation and rotation classification
    overrides:
      complex_consolidation_complexity_threshold: 0.65
      complex_consolidation_efficiency_threshold: 0.40
      complex_consolidation_event_density_threshold: 0.35
      volatile_rotation_volatility_threshold: 0.65

  - profile_id: balanced_high_tf
    description: Balanced high timeframe threshold profile
    overrides:
      directional_displacement_efficiency_threshold: 0.65
      directional_displacement_confidence_threshold: 0.60
      directional_expansion_persistence_threshold: 0.55
      directional_expansion_efficiency_threshold: 0.65
      complex_consolidation_complexity_threshold: 0.65
      complex_consolidation_efficiency_threshold: 0.40
      volatile_rotation_volatility_threshold: 0.65
    timeframe_overrides:
      D1:
        directional_displacement_efficiency_threshold: 0.68
        directional_displacement_confidence_threshold: 0.62
